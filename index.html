<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Match, autopsie d'une chute</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Préchargement de l'image de couverture pour éviter le saut vers roman.html -->
    <link rel="preload" as="image" href="images/couverture.png">
    <link rel="preload" as="image" href="images/couverturepangramme.png">
    <style>
        #delayed-button {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Match, autopsie d'une chute</h1>
    <nav>
        <a href="index.html" class="active">Accueil</a>
        <a href="roman.html">Le roman</a>
        <a href="personnages.html">Personnages</a>
        <a href="extraits.html">Extraits</a>
    </nav>
</header>

<section class="hero">
    <img src="images/couverture.png" class="hero-img" alt="Couverture Match, autopsie d'une chute">

    <div class="overlay">
        <h2 class="typewriter-title" id="animated-title"></h2>

        <p id="typed-text" class="typewriter-text"></p>

        <a href="roman.html" id="delayed-button">
            <button>Entrer dans le dossier</button>
        </a>
    </div>
</section>

<footer>
    <p>© 2026 - Stéphane Deferraz - Les Éditions du Pangramme</p>
</footer>

<script src="Script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        const titleElement = document.getElementById('animated-title');
        const titleText = "Un match. Une arrestation. Une disparition.";
        titleElement.innerHTML = '';

        for (let i = 0; i < titleText.length; i++) {
            const span = document.createElement('span');
            span.textContent = titleText[i];
            span.style.opacity = '0';
            titleElement.appendChild(span);
        }

        const spans = titleElement.querySelectorAll('span');
        let currentIndex = 0;

        function showNextLetter() {
            if (currentIndex < spans.length) {
                spans[currentIndex].style.opacity = '1';
                currentIndex++;
                setTimeout(showNextLetter, 100);
            } else {
                setTimeout(animateText, 500);
            }
        }

        function animateText() {
            const textElement = document.getElementById('typed-text');
            const fullText = "Une rencontre internationale de football, controversée, à Moscou...";
            textElement.textContent = '';
            let j = 0;

            function typeText() {
                if (j < fullText.length) {
                    textElement.textContent += fullText.charAt(j);
                    j++;
                    setTimeout(typeText, 60);
                } else {
                    setTimeout(showButton, 1000);
                }
            }
            typeText();
        }

        function showButton() {
            const btn = document.getElementById('delayed-button');
            btn.style.opacity = '1';
            btn.style.transform = 'translateY(0)';
        }

        showNextLetter();
    });
</script>

</body>
</html>
